<!DOCTYPE html>
<html lang="en">
<head>
    <title>LyS Haro Table</title>

    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
:root {
    
    font-family: 'Inter';
    font-size: 12pt;
    margin: .5em;
}

.haros-table {
    margin-left: 10.5em;
    display: flex;
    flex-direction: column;
    width: fit-content;
    gap: .5em;
}

.datum-grid {
    border-left: .4em solid #D8D8D8;
    display: flex;
    flex-direction: column;
    width: fit-content;
    background-color: #EFEFEF;
    padding: .25rem .5rem .25rem;
    cursor: pointer;
}

.datum-grid.used-true {
    border-left: .4rem solid #FCE300;
}

.datum-grid > * {
  margin-bottom: .5rem;
}

.header{
    display: flex;
    flex-direction: row;
    margin-bottom: .25rem;
}


.Summary {
  width: 49rem;
  font-weight: bold;
  padding-top: .4rem;
}

.expand-button {
  border: none;
  margin-right: .5em;
  font-weight: bold;
  cursor: pointer;
}



.add-button{
  margin-top: .3rem;
  height:1.5rem;
  color: #F04C23;
  font-weight: bold;
  width: 5rem;
  background-color: #D8D8D8;
  border: none;
  cursor: pointer;
}



.hide {
  display: none;
}

.MediaOutlet{
  padding-right: 1rem;
  padding-top: .5rem;
  width: 14rem;
  text-align: right;
}

.query-wrapper{
  width: 57rem;
}

.query-header{
  color: #F04C23;
}

.requirements-wrapper{
  width: 57rem;
}
.requirements-header{
  color: #F04C23;
}
.Name{
  font-weight: bold;
  margin-right: 0.5rem;
}
.DateReceived{
    margin-right: 1.5rem;
}


.search-bar{
    margin-left: 10.5em;
    padding: .5em 1em .5em;
    background: #EFEFEF;
    display: inline-flex;
    width: fit-content;
    flex-direction: row;
    height: fit-content;

}
.search-wrapper{
    margin-right: 1.5em;
}

.search {
    border: 1px solid black;
    border-radius: .5px;
    height: fit-content;
}

.search-button{
    display: inline;
    background-color: #D8D8D8;
    color: #F04C23;
    font-weight: bold;
    width: 6.5em;
    height: 2em;
    border: none;
    justify-self: center;
    margin-top: .5em;
    margin-bottom: .5em;
}
.search-button:hover{
    background-color: #dcdcdc;
    color: #e3684a;
}

.haros-menu{
    margin-left: 10.5em;
    margin-bottom: 1em;
}
.haros-nav{
    display: inline;
    width: fit-content;
    padding: .5em;
    font-weight: bold;
    color:#F04C23;
    background-color:#E5E5E5;
    margin-right: 1em; 
    border: none;
}

.page-nav{
    width: fit-content;
    margin-left: auto;
    margin-right: auto;
}
.page-nav-btn {
    display: inline;
    width: fit-content;
    padding: .5em;
    font-weight: bold;
    color:#F04C23;
    background-color:#E5E5E5;
    margin-right: 1em; 
    border: none;
    margin-bottom: .75em;
    margin-top: 2em;
}
    </style>
</head>
<body>
    <h1 class="page-header">LyS Haros Database</h1>
    <div class="haros-menu">
        <button class="all-haros haros-nav" id="all-haros">All Haros</button>
        <button class="fresh-haros haros-nav" id="fresh-haros">Fresh Haros</button>
        <button class="used-haros haros-nav" id="used-haros">Used Haros</button>
    </div>
    
    
    <div class="search-bar" id="search-bar"> 
        <div class="search-wrapper">
            <span class="search-label">Keywords</span>
            <input type="text" id="keywords-search" class="search">
        </div>

        <div class="search-wrapper">
            <span class="search-label">Media Outlet</span>
            <input type="text" id="mediaOutlet-search" class="search">
        </div>

        <div class="journalist-search-wrapper">
            <span class="search-label">Journalist</span>
            <input type="text" id='journalist-search' class="search">
        </div>
    </div>

    <button id="search-button" class="search-button">
        Search
    </button>

    <div class="page-nav">
        <button class="page-nav-btn" onclick="previous_page()">previous</button>
        <button class="page-nav-btn" onclick = "next_page()">next</button>
    </div>
    <div id="haros-table" class="haros-table"></div>
    <div class="page-nav">
        <button class="page-nav-btn" onclick="previous_page()">previous</button>
        <button class="page-nav-btn" onclick = "next_page()">next</button>
    </div>
    
    
<script type="text/javascript" charset="utf8" src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script>

document.getElementById('all-haros').onclick = () => {
    mode = 'all'
  page_number = 0;
  getMediaQueryData('/api/serveHaros')
}

document.getElementById('fresh-haros').onclick = () => {
    mode = 'fresh'
  page_number = 0;
  getMediaQueryData('/api/serveHaros/fresh')
}

document.getElementById('used-haros').onclick = () => {
    mode = 'used'
  page_number = 0;
  getMediaQueryData('/api/serveHaros/used')
}

const HAROS_TABLE = document.getElementById("haros-table");

let DATA;
let Categories = [];
let haros_per_page = 100;
const expanded_previously = {};
let mode = 'all'

getMediaQueryData('/api/serveHaros');


function getMediaQueryData(requestUrl) {
    
    const request = $.ajax(
      {
        'url' : requestUrl,
        success : (result, status, xhr) => {

            DATA = result.data;
            page_number = 1;
            //configDropdownMenus();8
            displayData();
        }

      }
    )
}

function displayData() {
    
    $('.haros-table *').remove();
    let min_index = haros_per_page*(page_number-1);

    let max_index = haros_per_page*page_number;
    if (max_index > DATA.length) max_index = DATA.length;
    console.log([min_index,max_index])
    for (let i = min_index; (i < max_index); i++) {
        try {
        insert_datum(DATA[i]);
        } catch (error) {
            console.log('error')
        }
    }
    $('html,body').scrollTop(0);
}

function next_page() {
    if (page_number*haros_per_page<DATA.length){
        page_number = page_number + 1;
        displayData();
    }

}

function previous_page() {
    if (page_number > 1){
        page_number = page_number - 1;
        displayData();
    }
}

function std_make(class_name, parent, ops) { //optional parameters: ops.content, ops.tag
    if (ops == undefined ) ops = {
        content: '',
        tag: 'div',
    }
    if (ops.content == undefined ) ops.content = "";
    if (ops.tag == undefined ) ops.tag = 'div'

    const doc_element = document.createElement(ops.tag);
    doc_element.classList.add(class_name);
    doc_element.innerHTML = ops.content;
    parent.appendChild(doc_element);

    return doc_element
}

function insert_datum(d) {
    
    const datum_grid = std_make('datum-grid',HAROS_TABLE, {grid_child: false})
    datum_grid.classList.add('hide');
    datum_grid.expanded_previously = false;
    datum_grid.expanded = false;
    const include_when_expanded = [];
    //wrappers for grid elements
    const header = std_make('header',datum_grid);


    const expand_button = std_make('expand-button',header, {tag: 'button'});
    expand_button.innerHTML = 'v';
    //data to display
    const summary = std_make('Summary',header,{content: d['Summary']})
    const mediaOutlet = std_make('MediaOutlet',header,{content:d['MediaOutlet']})
    

    datum_grid.onclick = function () {
        if (!datum_grid.expanded_previously) {

            const name_email_wrapper = std_make('name-email-wrapper', datum_grid );
            const name_email_header = std_make('name-email-header',name_email_wrapper,{content:"Contact: ", tag: 'span'})
            const name = std_make('Name',name_email_wrapper,{content: d['Name'], tag: 'span'})
            const email = std_make('Email',name_email_wrapper,{content: d['Email'], tag: 'span'})
            
            const category = std_make('Category',datum_grid,{content:`Category: ${d['Category']}`})

            const date_wrapper = std_make('date-wrapper',datum_grid);
            const dateReceived = std_make('DateReceived',date_wrapper,{
                content:("Recieved: " + d['DateReceived']), tag: 'span'
            })
            const deadline = std_make('Deadline',date_wrapper,{
                content:("Deadline: "+ d['Deadline']), tag: 'span'
            })

            const query_wrapper = std_make('query-wrapper',datum_grid);
            const query_header = std_make('query-header',query_wrapper, {content:"Query: "})
            const query = std_make('Query',query_wrapper, {content:d['Query'], grid_child: false})

            const requirements_wrapper = std_make('requirements-wrapper',datum_grid);
            const requirements_header = std_make('requirements-header',requirements_wrapper, {content:"Requirements: "})
            const requirements = std_make('Requirements',requirements_wrapper,{content: d['Requirements']})
            /*function () {

                for (let member of include_when_expanded){
                    member.classList.toggle('hide')
                }
            } */

            include_when_expanded.push(name_email_wrapper);
            include_when_expanded.push(query_wrapper);
            include_when_expanded.push(requirements_wrapper);
            include_when_expanded.push(date_wrapper);
            include_when_expanded.push(category);

            datum_grid.expanded_previously = true;
            for (let member of include_when_expanded) {
                member.classList.toggle('hide')
            }
        }
        if(datum_grid.expanded) {
          expand_button.innerHTML = 'v'
          datum_grid.expanded = false;
        } else {
          expand_button.innerHTML = '^'
          datum_grid.expanded = true;
        }
            
        for (let member of include_when_expanded) {
            member.classList.toggle('hide');
        }
    }

    //Additional collapse button
    


    //"Add button"
    let str;
    if (d['Used']=='Used') 
    {
        str = 'Remove'
        datum_grid.classList.add('used-true');
    }
    else str = 'Add'
    const add_button = std_make(
        'add-button',
        header,
        {
            content: str, 
            tag:'button',
            grid_child: true
        }
    )

    add_button.onclick = function(e) {
        if (this.innerHTML == "Add") {
            this.innerHTML = "Remove"
            $.ajax("/api/used/add/"+d['index'])
        } else {
            this.innerHTML = "Add"
            $.ajax("/api/used/remove/"+d['index'])
        }
        datum_grid.classList.toggle('used-true')
        e.stopPropagation();
    }
    
    

    datum_grid.classList.remove('hide');
}


document.getElementById('search-button').onclick = () => {
    terms = {
        keywords: document.getElementById('keywords-search').value,
        journalist: document.getElementById('journalist-search').value,
        mediaOutlet: document.getElementById('mediaOutlet-search').value
    }

    let requestUrl = '/api/serveHaros'
    if (mode == 'fresh') requestUrl = requestUrl + '/fresh';
    if (mode == 'used') requestUrl = requestUrl + '/used';
    requestUrl = requestUrl + '?'

    let allEmpty = true;
    for (let e in terms){
        if (terms[e]!=''){
            allEmpty=false;
            requestUrl = `${requestUrl}${e}=${terms[e]}&`
        }
    }
    requestUrl = requestUrl.substring(0,requestUrl.length-1);
    if (!allEmpty){
        console.log(requestUrl)
        getMediaQueryData(requestUrl);
    }

    

    
    
}
    </script>
</body>
</html>
