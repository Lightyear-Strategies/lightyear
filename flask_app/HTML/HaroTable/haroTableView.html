{% extends "HaroTable/base.html" %}

{% block content %}

  <table id="data" class="table table-striped">
    <thead>
      <tr>
        <th></th>
        <th>Summary</th>
        <th>Media Outlet</th>
        <th>Date Received</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
  <input type="text">
{% endblock %}

{% block scripts %}
<script>
    /* Formatting function for row details - modify as you need */
function format ( d ) {
    // show nothing if there is no name
    if (!(d.Name)) {d.Name = ''}
    // `d` is the original data object for the row
    return '<table class="table">'+
        '<tr>'+
            '<td>Name:</td>'+
            '<td>'+d.Name+'</td>'+
        '</tr>'+
        '<tr>'+
            '<td>Email:</td>'+
            '<td>'+d.Email+'</td>'+
        '</tr>'+
        '<tr>'+
            '<td>Query:</td>'+
            '<td>'+d.Query+'</td>'+
        '</tr>'+
        '<tr>'+
            '<td>Requirements:</td>'+
            '<td>'+d.Requirements+'</td>'+
        '</tr>'+
        '<tr>'+
            '<td>Deadline:</td>'+
            '<td>'+d.Deadline+'</td>'+
        '</tr>'+
    '</table>';
}

$(document).ready(function () {
    var table = $('#data').DataTable({
      order: [],
      ajax: {
        url:"/api/serveHaros",
      },
      serverSide: true,
      columns: [
        {  width:          "5%",
          orderable:      false,
          className:      'details-control',
          data:           null,
          defaultContent: ''
        },

        {data: 'Summary', orderable: false, width: "45%"},
        {data: 'MediaOutlet', width: "25%"},
        {data: 'DateReceived', width: "25%"},
      ]
    });


    //class=\"Add\" class=\"Remove\"
    $('#data tbody').on( 'click', 'button', function(){

      var action = this.id;
      var index = table.row( $(this).parents('tr') ).data().index;

      console.log(table.row( $(this).parents('tr') ).data())
      console.log(index);
      if (action === 'Add'){
        requestUrl = "/api/used/add/"+index;
        alert("Added to Used Table")
      }
      if (action === 'Remove'){
        requestUrl = "/api/used/remove/"+index;
        alert("Removed from Used Table")
      }
      $.ajax(requestUrl)
    });

    $('#all_button').click(function(){
      requestUrl = "/api/serveHaros";
      table.ajax.url(requestUrl).load();
    });

    $('#fresh_button').click(function(){
      requestUrl = "/api/serveHaros/fresh";
      table.ajax.url(requestUrl).load();
    });

    $('#used_button').click(function(){
      requestUrl = "/api/serveHaros/used";
      table.ajax.url(requestUrl).load();
    });

      // Switching with left and right keyboard buttons
    $(document).keydown( function(e) {
      // left arrow
      if ((e.keyCode || e.which) === 37) {
        $( "#data_previous" ).click();
      }
      // right arrow
      if ((e.keyCode || e.which) === 39) {
        $( "#data_next" ).click();
      }
    })
});

    // Add event listener for opening and closing details
    $('#data tbody').on('click', 'tr td.details-control', function () {
        var table = $('#data').DataTable();
        var tr = $(this).closest('tr');
        var row = table.row( tr );

        if ( row.child.isShown() ) {
            // This row is already open - close it
            tr.removeClass( 'details' );
            row.child.hide();
        }
        else {
            // Open this row
            tr.addClass( 'details' );
            row.child( format(row.data()) ).show();
        }
    } );


  </script>
{% endblock %}
